<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Someone Special ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* Hacker Background */
.matrix{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

.matrix span{
    position:absolute;
    top:-100px;
    color:#ff4da6;
    font-size:20px;
    animation:fall linear infinite;
    opacity:0.7;
}

@keyframes fall{
    to{
        transform:translateY(120vh);
    }
}

.card{
    width:340px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    animation:fade 1s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    color:#ff66b3;
    margin-bottom:15px;
}

p{
    color:#ddd;
    line-height:1.5;
}

.buttons{
    margin-top:30px;
    position:relative;
    height:100px;
}

button{
    border:none;
    padding:14px 28px;
    border-radius:50px;
    font-size:17px;
    cursor:pointer;
    transition:0.2s;
}

#yes{
    background:#ff4da6;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    background:white;
    color:black;
    position:absolute;
    left:190px;
}

.loading{
    font-size:22px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0.4;
    }
}

.heart{
    position:absolute;
    color:#ff4da6;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- Music -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- Background -->
<div class="matrix" id="matrix"></div>

<div class="card" id="mainCard">
    <h1>Hey You ❤️</h1>

    <p>
        Dari semua orang yang saya jumpa,<br>
        awak yang paling buat saya rasa tenang.
    </p>

    <br>

    <h2>Will You Be My Girlfriend?</h2>

    <div class="buttons">
        <button id="yes">Yes 💖</button>
        <button id="no">No 😭</button>
    </div>
</div>

<script>
/* =========================
   TELEGRAM BOT
========================= */

const BOT_TOKEN = "PASTE_BOT_TOKEN";
const CHAT_ID = "PASTE_CHAT_ID";

async function sendTelegram(message){
    try{
        await fetch(https://api.telegram.org/bot${BOT_TOKEN}/sendMessage,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                chat_id: CHAT_ID,
                text: message
            })
        });
    }catch(err){
        console.log(err);
    }
}

/* =========================
   MATRIX EFFECT
========================= */

const matrix = document.getElementById("matrix");

for(let i=0;i<70;i++){
    const span = document.createElement("span");
    span.innerHTML = "01 ❤️";
    span.style.left = Math.random()*100 + "vw";
    span.style.animationDuration = (Math.random()*5+3) + "s";
    span.style.fontSize = (Math.random()*20+10) + "px";
    matrix.appendChild(span);
}

/* =========================
   BUTTONS
========================= */

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");

/* NO BUTTON LARI */
function moveButton(){
    const x = Math.random()*200;
    const y = Math.random()*70;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

/* YES BUTTON */
yesBtn.addEventListener("click", async ()=>{

    /* SEND TELEGRAM */
    await sendTelegram("❤️ DIA TEKAN YES ❤️");

    /* LOADING SCREEN */
    document.body.innerHTML = `
        <div class="loading">
            Checking feelings...
        </div>
    `;

    setTimeout(()=>{
        document.body.innerHTML = `
        <div style="text-align:center;">
            <h1 style="font-size:55px;color:#ff66b3;">
                SHE SAID YES ❤️
            </h1>

            <p style="font-size:24px;margin-top:15px;">
                Officially together now 😭💖
            </p>
        </div>
        `;

        setInterval(createHeart,200);

    },3000);
});

/* HEART EFFECT */
function createHeart(){
    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*window.innerWidth + "px";
    heart.style.fontSize = (Math.random()*20+20) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}
</script>

</body>
</html>
